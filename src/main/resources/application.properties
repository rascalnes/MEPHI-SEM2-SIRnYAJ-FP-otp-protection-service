# Server
server.port=8080
server.backlog=50

# Database
db.url=jdbc:postgresql://localhost:5432/otp_service
db.username=postgres
db.password=postgres
db.maxPoolSize=10
db.minIdle=2

# JWT
jwt.secret=mySuperSecretKeyForJWTTokenGeneration2024!
jwt.expirationMs=3600000

# OTP Defaults (will be overridden by DB config)
otp.default.lifetimeSeconds=300
otp.default.codeLength=6

# Scheduler
scheduler.expiryIntervalSeconds=30